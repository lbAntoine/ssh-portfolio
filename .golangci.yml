version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - misspell
    - unconvert
    - unparam
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - goimports
    - gofmt
